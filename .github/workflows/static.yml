name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build # package.json에 빌드 명령어가 있어야 합니다.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 빌드 결과물이 저장되는 폴더명 (보통 dist 또는 build)
      - uses: actions/deploy-pages@v4
